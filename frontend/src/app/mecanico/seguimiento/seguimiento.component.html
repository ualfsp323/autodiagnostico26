<section class="tracking-shell split">
  <div class="left">
    <header>
      <p class="eyebrow">Seguimiento</p>
      <h1>Cliente en taller #{{ clientId }}</h1>
    </header>

    @if (loading) {
      <p class="info">Cargando seguimiento...</p>
    }

    @if (!loading && tracking?.latestUpdate) {
      <div class="last-update">
        <p class="title">Última actualización guardada</p>
        <p>{{ tracking?.latestUpdate }}</p>
      </div>
    }

    <div class="status-row">
      <label>Status:</label>
      <div class="status-controls">
        <button type="button" (click)="setStatus('verde')" [class.active]="status==='verde'">Verde</button>
        <button type="button" (click)="setStatus('amarillo')" [class.active]="status==='amarillo'">Amarillo</button>
        <button type="button" (click)="setStatus('naranja')" [class.active]="status==='naranja'">Naranja</button>
        <button type="button" (click)="setStatus('rojo')" [class.active]="status==='rojo'">Rojo</button>
      </div>
    </div>

    <label>
      Actualización para el cliente
      <textarea [(ngModel)]="message" rows="4" placeholder="Escribe una actualización para el usuario"></textarea>
    </label>

    <button type="button" (click)="addMessage()">Enviar actualización</button>

    <div class="chat-log">
      <p *ngFor="let update of updates">{{ update }}</p>
    </div>
  </div>

 <aside class="right">
@if (tracking?.sessionUuid) {
  <app-seguimiento-chat
    [participantIdInput]="chatParticipantId"
    [sessionUuidInput]="tracking!.sessionUuid">
  </app-seguimiento-chat>
}
</aside>

</section>
