<section class="mechanic-shell">
  <header class="mechanic-header">
    <div>
      <p class="eyebrow">Panel de mecánico</p>
      <h1>{{ mechanicName }}</h1>
      <p class="workshop">{{ workshopName }}</p>
    </div>

    <a routerLink="/mecanico" class="clients-button">Clientes</a>
  </header>

  <main class="clients-panel">
    <article class="client-card" *ngFor="let client of clients" [ngClass]="client.status" routerLink="/mecanico/seguimiento">
      <div class="client-topline">
        <h2>{{ client.userName }}</h2>
        <span class="status-pill">{{ getStatusLabel(client.status) }}</span>
      </div>

      <div class="client-details">
        <p><strong>Coche:</strong> {{ client.car }}</p>
        <p><strong>Problema:</strong> {{ client.problem }}</p>
      </div>

      <p class="client-action">Ver seguimiento</p>
    </article>
  </main>
</section>
