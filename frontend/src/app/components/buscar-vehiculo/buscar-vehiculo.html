<section class="bv-card" [formGroup]="form">

  <!-- Cabecera -->
  <div class="bv-header">
    <h2 class="bv-title">Información del vehículo</h2>
    <span class="bv-subtitle">Opcional — cuanto más indiques, más preciso será el diagnóstico</span>
  </div>

  <!-- Bloque 1: Marca y Modelo -->
  <div class="bv-row">

    <div class="bv-field">
      <label class="bv-label" for="bv-brand">Marca</label>
      <div class="bv-select-wrap" [class.bv-loading]="loadingBrands">
        <svg class="bv-select-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path d="M9 6a3 3 0 1 1 6 0 3 3 0 0 1-6 0ZM2 10a5 5 0 0 1 10 0H2Zm10 0a5 5 0 0 1 10 0H12Z"/>
          <path fill-rule="evenodd" clip-rule="evenodd"
                d="M2.5 17a7.5 7.5 0 0 1 15 0H2.5Z"/>
        </svg>
        <select id="bv-brand" class="bv-select" formControlName="brand">
          <option [ngValue]="null" disabled selected>{{ loadingBrands ? 'Cargando…' : 'Selecciona marca' }}</option>
          @for (brand of brands; track brand) {
            <option [value]="brand">{{ brand }}</option>
          }
          @if (!loadingBrands && brands.length === 0) {
            <option disabled>Sin datos en BD</option>
          }
        </select>
        <svg class="bv-chevron" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" clip-rule="evenodd"
                d="M5.293 7.293a1 1 0 0 1 1.414 0L10 10.586l3.293-3.293a1 1 0 1 1 1.414 1.414l-4 4a1 1 0 0 1-1.414 0l-4-4a1 1 0 0 1 0-1.414Z"/>
        </svg>
      </div>
    </div>

    <div class="bv-field">
      <label class="bv-label" for="bv-model"
             [class.bv-label-muted]="form.get('modelId')!.disabled">Modelo</label>
      <div class="bv-select-wrap"
           [class.bv-loading]="loadingModels"
           [class.bv-disabled]="form.get('modelId')!.disabled">
        <svg class="bv-select-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99ZM6.85 7h10.29l1.08 3.11H5.77L6.85 7ZM19 17H5v-5h14v5Z"/>
          <circle cx="7.5" cy="14.5" r="1.5"/>
          <circle cx="16.5" cy="14.5" r="1.5"/>
        </svg>
        <select id="bv-model" class="bv-select" formControlName="modelId">
          <option [ngValue]="null" disabled selected>
            {{ loadingModels ? 'Cargando…' : (form.get('modelId')!.disabled ? 'Elige marca primero' : 'Selecciona modelo') }}
          </option>
          @for (model of models; track model.id) {
            <option [value]="model.id">{{ model.name }}</option>
          }
        </select>
        <svg class="bv-chevron" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" clip-rule="evenodd"
                d="M5.293 7.293a1 1 0 0 1 1.414 0L10 10.586l3.293-3.293a1 1 0 1 1 1.414 1.414l-4 4a1 1 0 0 1-1.414 0l-4-4a1 1 0 0 1 0-1.414Z"/>
        </svg>
      </div>
    </div>

  </div>

  <!-- Separador con indicador de precisión -->
  <div class="bv-precision-bar">
    <div class="bv-precision-dots">
      @for (filled of precisionDots; track $index) {
        <span class="bv-dot" [class.bv-dot-filled]="filled"></span>
      }
    </div>
    <span class="bv-precision-label">{{ precisionLabel }}</span>
  </div>

  <!-- Bloque 2: Detalles opcionales -->
  <div class="bv-section-header">
    <span class="bv-section-title">¿Cuánto conoces tu coche?</span>
    <span class="bv-section-hint">Completa lo que sepas para afinar el diagnóstico</span>
  </div>

  <div class="bv-row bv-row-detail">

    <div class="bv-field">
      <label class="bv-label" for="bv-variant"
             [class.bv-label-muted]="form.get('variantId')!.disabled">Variante específica</label>
      <div class="bv-select-wrap"
           [class.bv-loading]="loadingVariants"
           [class.bv-disabled]="form.get('variantId')!.disabled">
        <svg class="bv-select-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" clip-rule="evenodd"
                d="M3 4a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H4a1 1 0 0 1-1-1Zm0 4a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H4a1 1 0 0 1-1-1Zm0 4a1 1 0 0 1 1-1h6a1 1 0 1 1 0 2H4a1 1 0 0 1-1-1Z"/>
        </svg>
        <select id="bv-variant" class="bv-select" formControlName="variantId">
          <option [ngValue]="null" disabled selected>
            {{ loadingVariants ? 'Cargando…' : (form.get('variantId')!.disabled ? 'Elige modelo primero' : 'Selecciona variante') }}
          </option>
          @for (variant of variants; track variant.id) {
            <option [value]="variant.id">{{ variant.modelName }}</option>
          }
        </select>
        <svg class="bv-chevron" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" clip-rule="evenodd"
                d="M5.293 7.293a1 1 0 0 1 1.414 0L10 10.586l3.293-3.293a1 1 0 1 1 1.414 1.414l-4 4a1 1 0 0 1-1.414 0l-4-4a1 1 0 0 1 0-1.414Z"/>
        </svg>
      </div>
    </div>

    <div class="bv-field bv-field-year">
      <label class="bv-label" for="bv-year">Año de fabricación</label>
      <div class="bv-input-wrap">
        <svg class="bv-select-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" clip-rule="evenodd"
                d="M6 2a1 1 0 0 0-1 1v1H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1V3a1 1 0 1 0-2 0v1H7V3a1 1 0 0 0-1-1Zm0 5a1 1 0 0 0 0 2h8a1 1 0 1 0 0-2H6Z"/>
        </svg>
        <input
          id="bv-year"
          class="bv-input"
          type="number"
          formControlName="year"
          placeholder="ej. 2019"
          min="1900"
          [max]="currentYear"
        />
      </div>
    </div>

    <div class="bv-field">
      <label class="bv-label" for="bv-engine">Motorización</label>
      <div class="bv-select-wrap">
        <svg class="bv-select-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M7 4v2H4v3H2v4h2v3h3v2h2v-2h2v2h2v-2h3v-3h2v-4h-2V6h-3V4h-2v2h-2V4H7Zm1 4h8v8H8V8Z"/>
        </svg>
        <select id="bv-engine" class="bv-select" formControlName="engineType">
          <option [ngValue]="null">No lo sé / Cualquiera</option>
          @for (opt of engineTypeOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
          }
        </select>
        <svg class="bv-chevron" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" clip-rule="evenodd"
                d="M5.293 7.293a1 1 0 0 1 1.414 0L10 10.586l3.293-3.293a1 1 0 1 1 1.414 1.414l-4 4a1 1 0 0 1-1.414 0l-4-4a1 1 0 0 1 0-1.414Z"/>
        </svg>
      </div>
    </div>

    <div class="bv-field">
      <label class="bv-label" for="bv-transmission">Transmisión</label>
      <div class="bv-select-wrap">
        <svg class="bv-select-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2a2 2 0 1 1 0 4 2 2 0 0 1 0-4ZM4 7a2 2 0 1 1 0 4 2 2 0 0 1 0-4Zm16 0a2 2 0 1 1 0 4 2 2 0 0 1 0-4ZM4 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4Zm16 0a2 2 0 1 1 0 4 2 2 0 0 1 0-4ZM11 4h2v6H11V4ZM5 9h14v2H5V9Zm-1 6h2v5H4v-5Zm16 0h2v5h-2v-5Z"/>
        </svg>
        <select id="bv-transmission" class="bv-select" formControlName="transmission">
          <option [ngValue]="null">No lo sé / Cualquiera</option>
          @for (opt of transmissionOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
          }
        </select>
        <svg class="bv-chevron" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" clip-rule="evenodd"
                d="M5.293 7.293a1 1 0 0 1 1.414 0L10 10.586l3.293-3.293a1 1 0 1 1 1.414 1.414l-4 4a1 1 0 0 1-1.414 0l-4-4a1 1 0 0 1 0-1.414Z"/>
        </svg>
      </div>
    </div>

  </div>

</section>
