<div class="dv-row" [formGroup]="form">

  <!-- Variante específica -->
  <div class="dv-field">
    <label class="dv-label" for="dv-variant"
           [class.dv-label-muted]="disabled">Variante específica</label>
    <div class="dv-select-wrap"
         [class.dv-loading]="loadingVariants"
         [class.dv-disabled]="disabled">
      <svg class="dv-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" clip-rule="evenodd"
              d="M3 4a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H4a1 1 0 0 1-1-1Zm0 4a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H4a1 1 0 0 1-1-1Zm0 4a1 1 0 0 1 1-1h6a1 1 0 1 1 0 2H4a1 1 0 0 1-1-1Z"/>
      </svg>
      <select id="dv-variant" class="dv-select" formControlName="variantId">
        <option [ngValue]="null" disabled selected>
          {{ loadingVariants ? 'Cargando…' : (disabled ? 'Elige modelo primero' : 'Selecciona variante') }}
        </option>
        @for (variant of variants; track variant.id) {
          <option [value]="variant.id">{{ variant.modelName }}</option>
        }
      </select>
      <svg class="dv-chevron" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" clip-rule="evenodd"
              d="M5.293 7.293a1 1 0 0 1 1.414 0L10 10.586l3.293-3.293a1 1 0 1 1 1.414 1.414l-4 4a1 1 0 0 1-1.414 0l-4-4a1 1 0 0 1 0-1.414Z"/>
      </svg>
    </div>
  </div>

  <!-- Año de fabricación -->
  <div class="dv-field">
    <label class="dv-label" for="dv-year">Año de fabricación</label>
    <div class="dv-input-wrap">
      <svg class="dv-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" clip-rule="evenodd"
              d="M6 2a1 1 0 0 0-1 1v1H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1V3a1 1 0 1 0-2 0v1H7V3a1 1 0 0 0-1-1Zm0 5a1 1 0 0 0 0 2h8a1 1 0 1 0 0-2H6Z"/>
      </svg>
      <input id="dv-year" class="dv-input" type="number"
             formControlName="year"
             placeholder="ej. 2019"
             min="1900" [max]="currentYear" />
    </div>
  </div>

  <!-- Motorización -->
  <div class="dv-field">
    <label class="dv-label" for="dv-engine">Motorización</label>
    <div class="dv-select-wrap">
      <svg class="dv-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M7 4v2H4v3H2v4h2v3h3v2h2v-2h2v2h2v-2h3v-3h2v-4h-2V6h-3V4h-2v2h-2V4H7Zm1 4h8v8H8V8Z"/>
      </svg>
      <select id="dv-engine" class="dv-select" formControlName="engineType">
        <option [ngValue]="null">No lo sé / Cualquiera</option>
        @for (opt of engineTypeOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
      <svg class="dv-chevron" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" clip-rule="evenodd"
              d="M5.293 7.293a1 1 0 0 1 1.414 0L10 10.586l3.293-3.293a1 1 0 1 1 1.414 1.414l-4 4a1 1 0 0 1-1.414 0l-4-4a1 1 0 0 1 0-1.414Z"/>
      </svg>
    </div>
  </div>

  <!-- Transmisión -->
  <div class="dv-field">
    <label class="dv-label" for="dv-transmission">Transmisión</label>
    <div class="dv-select-wrap">
      <svg class="dv-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2a2 2 0 1 1 0 4 2 2 0 0 1 0-4ZM4 7a2 2 0 1 1 0 4 2 2 0 0 1 0-4Zm16 0a2 2 0 1 1 0 4 2 2 0 0 1 0-4ZM4 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4Zm16 0a2 2 0 1 1 0 4 2 2 0 0 1 0-4ZM11 4h2v6H11V4ZM5 9h14v2H5V9Zm-1 6h2v5H4v-5Zm16 0h2v5h-2v-5Z"/>
      </svg>
      <select id="dv-transmission" class="dv-select" formControlName="transmission">
        <option [ngValue]="null">No lo sé / Cualquiera</option>
        @for (opt of transmissionOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
      <svg class="dv-chevron" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" clip-rule="evenodd"
              d="M5.293 7.293a1 1 0 0 1 1.414 0L10 10.586l3.293-3.293a1 1 0 1 1 1.414 1.414l-4 4a1 1 0 0 1-1.414 0l-4-4a1 1 0 0 1 0-1.414Z"/>
      </svg>
    </div>
  </div>

</div>
