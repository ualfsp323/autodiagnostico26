<section class="login-shell">
  <div class="login-card">
    <div class="login-copy">
      <h1>
        {{ mode === 'login' ? 'Bienvenido a' : 'Crea tu cuenta en' }}
      </h1>
      <div class="brand-container">
        <img src="logo.png" alt="AutoDiagnostico" class="login-logo" />
        <span class="brand-name">AutoDiagnostico</span>
      </div>
    </div>

    <form class="login-form" (ngSubmit)="submit()">
      <div class="mode-switch">
        <button type="button" class="mode-switch-btn" [class.mode-switch-btn--active]="mode === 'login'" (click)="switchMode('login')">Iniciar sesión</button>
        <button type="button" class="mode-switch-btn" [class.mode-switch-btn--active]="mode === 'register'" (click)="switchMode('register')">Registrarse</button>
      </div>

      @if (mode === 'register') {
        <label class="field">
          <span>Nombre completo</span>
          <input type="text" [(ngModel)]="fullName" name="fullName" autocomplete="name" placeholder="Pablo Martín" />
        </label>
      }

      <label class="field">
        <span>Correo electrónico</span>
        <input type="email" [(ngModel)]="email" name="email" autocomplete="email" placeholder="correo@ejemplo.com" [class.field--error]="!!emailFieldError" />
        @if (emailFieldError) {
          <small class="field-error">{{ emailFieldError }}</small>
        }
      </label>

      <label class="field">
        <span>Contraseña</span>
        <input type="password" [(ngModel)]="password" name="password" autocomplete="current-password" placeholder="••••••••" />
      </label>

      @if (mode === 'register') {
        <label class="field">
          <span>Confirmar contraseña</span>
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" autocomplete="new-password" placeholder="••••••••" />
        </label>
      }

      @if (errorMessage) {
        <p class="error-message">{{ errorMessage }}</p>
      }

      <label class="remember-row">
        <input type="checkbox" [(ngModel)]="keepSession" name="keepSession" />
        <span>Recordarme en este dispositivo</span>
      </label>

      <button type="submit" class="primary-btn" [disabled]="isSubmitting">
        @if (isSubmitting) {
          Procesando...
        } @else {
          {{ mode === 'login' ? 'Entrar' : 'Registrarse' }}
        }
      </button>
    </form>
  </div>
</section>
